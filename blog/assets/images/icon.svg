<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="#4CAF50"/>

  <!-- 鳄鱼头部 -->
  <circle cx="50" cy="50" r="30" fill="#81C784"/>
  
  <!-- 鳄鱼的眼睛 -->
  <circle cx="38" cy="42" r="5" fill="white"/>
  <circle cx="62" cy="42" r="5" fill="white"/>
  <circle cx="38" cy="42" r="2" fill="#388E3C"/>
  <circle cx="62" cy="42" r="2" fill="#388E3C"/>

  <!-- 鳄鱼的嘴巴 -->
  <path d="M35,55 Q50,70, 65,55" stroke="#388E3C" stroke-width="3" fill="none"/>
  
  <!-- 鳄鱼的牙齿 -->
  <path d="M45,56 L45,62" stroke="#fff" stroke-width="2"/>
  <path d="M55,56 L55,62" stroke="#fff" stroke-width="2"/>
  
  <!-- 鳄鱼的鳍 -->
  <path d="M50,30 Q40,40, 35,25" stroke="#388E3C" stroke-width="4" fill="none"/>
  <path d="M50,30 Q60,40, 65,25" stroke="#388E3C" stroke-width="4" fill="none"/>

  <!-- 中间的镂空区域，替换为卡通鳄鱼头部形状 -->
  <circle cx="50" cy="50" r="20" fill="white"/>
  <path d="M35,50 L65,50 L65,70 L35,70 Z" fill="white"/>
  <path d="M50,50 L50,70" stroke="#388E3C" stroke-width="3"/>
</svg>
