  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: 'cbd4b84bfe613a492e46e99287c40e69',

    function send(actionType, payload) {
      const message = JSON.stringify({ actionType, payload });
      window.ReactNativeWebView.postMessage(message);
    }

    function log(text) {
      send('log', text);
    }

    function loadMap() {
      AMapLoader.load({
        key: '9ce88f9058db05ef0feab1a6a981fe01',
        version: '2.1Beta',
      })
        .then(initMap)
        .catch(function (error) {
          console.error(error);
        });
    }

    function initMap() {
      const map = new AMap.Map('container', {
        viewMode: '3D',
        zoom: 16,
      });
      window.amap = map;

      AMap.plugin(['AMap.Scale', 'AMap.ToolBar', 'AMap.Geolocation', 'AMap.MapType'], function () {
        map.addControl(new AMap.Scale());
        map.addControl(new AMap.ToolBar());
        map.addControl(new AMap.MapType());
        var geolocation = new AMap.Geolocation({
          zoomToAccuracy: true,
        });

        geolocation.getCurrentPosition(function (status, result) {
          if (status === 'complete') {
            map.setCenter([result.position.lng, result.position.lat]);
          } else {
            console.error(result);
          }
        });
      });

      addMarkers();
    }

    function showInfo(e) {
      const postId = e.target.getExtData();
      send('showInfo', postId);
    }

    function addMarkers() {
      for (var i = 0; i < data.length; i++) {
        var item = data[i];
        var url = `${EXPO_PUBLIC_API_SERVER}${item.author.avatar.formats.thumbnail.url}`;
        var content = `<img src="${url}" data-id="${item.id}"
            style="width: 24px; height:24px; border-radius:50%;"  />`;
        var position = item.poi.location.split(',');

        var marker = new AMap.Marker({
          content,
          position,
          title: item.author.username,
          anchor: 'top-left',
          offset: new AMap.Pixel(-12, -12),
        });
        marker.setExtData(item.id);
        marker.on('click', showInfo);
        window.amap.add(marker);
      }
    }

    loadMap();
  </script>
